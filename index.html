<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>タロット占い</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#111827;
    color:white;
    font-family:sans-serif;
}

.container{
    max-width:1100px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.controls{
    background:#1f2937;
    padding:20px;
    border-radius:16px;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
}

select, button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    cursor:pointer;
    margin-top:15px;
    transition:0.2s;
}

.drawBtn{
    background:#7c3aed;
    color:white;
}

.drawBtn:hover{
    background:#6d28d9;
}

.saveBtn{
    background:#059669;
    color:white;
}

.saveBtn:hover{
    background:#047857;
}

.deleteBtn{
    background:#dc2626;
    color:white;
}

.deleteBtn:hover{
    background:#b91c1c;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    margin-top:20px;
}

.card{
    background:#1f2937;
    padding:15px;
    border-radius:16px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.card h3{
    margin:0 0 10px;
}

.upright{
    color:#34d399;
    font-weight:bold;
}

.reversed{
    color:#f87171;
    font-weight:bold;
}

.history{
    margin-top:40px;
    background:#1f2937;
    padding:20px;
    border-radius:16px;
}

.historyItem{
    border-bottom:1px solid #374151;
    padding:20px 0;
}

.historyItem:last-child{
    border-bottom:none;
}

.date{
    color:#9ca3af;
    font-size:14px;
    margin-bottom:12px;
}

.savedCard{
    margin-bottom:5px;
}

.deleteSingleBtn{
    background:#ef4444;
    color:white;
    margin-top:15px;
}

.deleteSingleBtn:hover{
    background:#dc2626;
}

.emptyText{
    color:#9ca3af;
}

</style>
</head>

<body>

<div class="container">

<h1>🔮 タロット占い 🔮</h1>

<div class="controls">

<label>引く枚数 (1〜10)</label>

<select id="cardCount">
<option value="1">1枚</option>
<option value="2">2枚</option>
<option value="3">3枚</option>
<option value="4">4枚</option>
<option value="5">5枚</option>
<option value="6">6枚</option>
<option value="7">7枚</option>
<option value="8">8枚</option>
<option value="9">9枚</option>
<option value="10">10枚</option>
</select>

<label>正逆設定</label>

<select id="reverseMode">
<option value="true">正逆あり</option>
<option value="false">正逆なし</option>
</select>

<button class="drawBtn" onclick="drawTarot()">
カードを引く
</button>

<button class="saveBtn" onclick="saveResult()">
結果を保存
</button>

<button class="deleteBtn" onclick="deleteAllHistory()">
保存結果を全削除
</button>

</div>

<div class="cards" id="result"></div>

<div class="history">

<h2>保存済み結果</h2>

<div id="historyContent">
<div class="emptyText">
まだ保存された結果はありません。
</div>
</div>

</div>

</div>

<script>

const tarotCards = [

"愚者","魔術師","女教皇","女帝","皇帝","法王","恋人",
"戦車","力","隠者","運命の輪","正義","吊るされた男",
"死神","節制","悪魔","塔","星","月","太陽","審判","世界",

"ワンドのエース","ワンドの2","ワンドの3","ワンドの4","ワンドの5",
"ワンドの6","ワンドの7","ワンドの8","ワンドの9","ワンドの10",
"ワンドのペイジ","ワンドのナイト","ワンドのクイーン","ワンドのキング",

"カップのエース","カップの2","カップの3","カップの4","カップの5",
"カップの6","カップの7","カップの8","カップの9","カップの10",
"カップのペイジ","カップのナイト","カップのクイーン","カップのキング",

"ソードのエース","ソードの2","ソードの3","ソードの4","ソードの5",
"ソードの6","ソードの7","ソードの8","ソードの9","ソードの10",
"ソードのペイジ","ソードのナイト","ソードのクイーン","ソードのキング",

"ペンタクルのエース","ペンタクルの2","ペンタクルの3","ペンタクルの4",
"ペンタクルの5","ペンタクルの6","ペンタクルの7","ペンタクルの8",
"ペンタクルの9","ペンタクルの10","ペンタクルのペイジ",
"ペンタクルのナイト","ペンタクルのクイーン","ペンタクルのキング"

];

let currentResult = [];

function secureRandom(max){

    const array = new Uint32Array(1);

    crypto.getRandomValues(array);

    return array[0] % max;
}

function shuffle(array){

    for(let i = array.length - 1; i > 0; i--){

        const j = secureRandom(i + 1);

        [array[i], array[j]] = [array[j], array[i]];
    }
}

function drawTarot(){

    const count =
    parseInt(document.getElementById("cardCount").value);

    const reverseMode =
    document.getElementById("reverseMode").value === "true";

    let deck = [...tarotCards];

    shuffle(deck);

    const drawn = deck.slice(0, count);

    const resultDiv =
    document.getElementById("result");

    resultDiv.innerHTML = "";

    currentResult = [];

    drawn.forEach(card => {

        let reversed = false;

        if(reverseMode){
            reversed = secureRandom(2) === 0;
        }

        const position =
        reversed ? "逆位置" : "正位置";

        const className =
        reversed ? "reversed" : "upright";

        const cardDiv =
        document.createElement("div");

        cardDiv.className = "card";

        cardDiv.innerHTML = `
            <h3>${card}</h3>

            <p class="${className}">
                ${position}
            </p>
        `;

        resultDiv.appendChild(cardDiv);

        currentResult.push({
            name: card,
            position: position,
            className: className
        });

    });

}

function saveResult(){

    if(currentResult.length === 0){

        alert("先にカードを引いてください");

        return;
    }

    const history =
    JSON.parse(
        localStorage.getItem("tarotHistory")
    ) || [];

    history.unshift({

        date: new Date().toLocaleString(),

        cards: currentResult

    });

    localStorage.setItem(
        "tarotHistory",
        JSON.stringify(history)
    );

    loadHistory();

    alert("結果を保存しました");

}

function loadHistory(){

    const historyContent =
    document.getElementById("historyContent");

    const history =
    JSON.parse(
        localStorage.getItem("tarotHistory")
    ) || [];

    if(history.length === 0){

        historyContent.innerHTML = `
            <div class="emptyText">
                まだ保存された結果はありません。
            </div>
        `;

        return;
    }

    let html = "";

    history.forEach((item, index) => {

        html += `
        <div class="historyItem">

            <div class="date">
                ${item.date}
            </div>
        `;

        item.cards.forEach(card => {

            html += `
            <div class="savedCard">

                ${card.name}
                -

                <span class="${card.className}">
                    ${card.position}
                </span>

            </div>
            `;
        });

        html += `

            <button
                class="deleteSingleBtn"
                onclick="deleteSingleHistory(${index})"
            >
                この結果を削除
            </button>

        </div>
        `;
    });

    historyContent.innerHTML = html;

}

function deleteSingleHistory(index){

    const confirmDelete =
    confirm("この結果を削除しますか？");

    if(!confirmDelete){
        return;
    }

    const history =
    JSON.parse(
        localStorage.getItem("tarotHistory")
    ) || [];

    history.splice(index, 1);

    localStorage.setItem(
        "tarotHistory",
        JSON.stringify(history)
    );

    loadHistory();

}

function deleteAllHistory(){

    const confirmDelete =
    confirm("保存された結果を全削除しますか？");

    if(!confirmDelete){
        return;
    }

    localStorage.removeItem("tarotHistory");

    loadHistory();

    alert("全削除しました");

}

loadHistory();

</script>

</body>
</html>
