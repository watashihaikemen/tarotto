<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タロット占い Full Deck</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#111827;
    color:white;
    font-family:sans-serif;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.controls{
    background:#1f2937;
    padding:20px;
    border-radius:16px;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
}

select, button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    cursor:pointer;
    margin-top:15px;
    transition:0.2s;
}

.drawBtn{
    background:#7c3aed;
    color:white;
}

.drawBtn:hover{
    background:#6d28d9;
}

.saveBtn{
    background:#059669;
    color:white;
}

.saveBtn:hover{
    background:#047857;
}

.deleteBtn{
    background:#dc2626;
    color:white;
}

.deleteBtn:hover{
    background:#b91c1c;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:20px;
}

.card{
    background:#1f2937;
    padding:15px;
    border-radius:16px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.card img{
    width:100%;
    border-radius:12px;
    margin-bottom:12px;
}

.card h3{
    margin:0 0 10px;
}

.upright{
    color:#34d399;
    font-weight:bold;
}

.reversed{
    color:#f87171;
    font-weight:bold;
}

.history{
    margin-top:40px;
    background:#1f2937;
    padding:20px;
    border-radius:16px;
}

.historyItem{
    border-bottom:1px solid #374151;
    padding:20px 0;
}

.historyItem:last-child{
    border-bottom:none;
}

.savedCard{
    margin-bottom:8px;
}

.date{
    color:#9ca3af;
    margin-bottom:10px;
    font-size:14px;
}

.deleteSingleBtn{
    background:#ef4444;
    color:white;
    margin-top:15px;
}

.deleteSingleBtn:hover{
    background:#dc2626;
}

.emptyText{
    color:#9ca3af;
}
</style>
</head>

<body>

<div class="container">

    <h1>🔮 タロット占い Full Deck 🔮</h1>

    <div class="controls">

        <label>引く枚数 (1〜10)</label>

        <select id="cardCount">
            <option value="1">1枚</option>
            <option value="2">2枚</option>
            <option value="3">3枚</option>
            <option value="4">4枚</option>
            <option value="5">5枚</option>
            <option value="6">6枚</option>
            <option value="7">7枚</option>
            <option value="8">8枚</option>
            <option value="9">9枚</option>
            <option value="10">10枚</option>
        </select>

        <label>正逆設定</label>

        <select id="reverseMode">
            <option value="true">正逆あり</option>
            <option value="false">正逆なし</option>
        </select>

        <button class="drawBtn" onclick="drawTarot()">カードを引く</button>

        <button class="saveBtn" onclick="saveResult()">結果を保存</button>

        <button class="deleteBtn" onclick="deleteAllHistory()">保存結果を全削除</button>

    </div>

    <div class="cards" id="result"></div>

    <div class="history">
        <h2>保存済み結果</h2>
        <div id="historyContent">
            <div class="emptyText">まだ保存された結果はありません。</div>
        </div>
    </div>

</div>

<script>

const tarotCards = [

    // カップだけ抜粋

    { name:"カップのエース", image:"https://upload.wikimedia.org/wikipedia/commons/3/36/Cups01.jpg" },
    { name:"カップの2", image:"https://upload.wikimedia.org/wikipedia/commons/f/f8/Cups02.jpg" },
    { name:"カップの3", image:"https://upload.wikimedia.org/wikipedia/commons/7/7a/Cups03.jpg" },
    { name:"カップの4", image:"https://upload.wikimedia.org/wikipedia/commons/3/35/Cups04.jpg" },
    { name:"カップの5", image:"https://upload.wikimedia.org/wikipedia/commons/d/d7/Cups05.jpg" },
    { name:"カップの6", image:"https://upload.wikimedia.org/wikipedia/commons/1/17/Cups06.jpg" },
    { name:"カップの7", image:"https://upload.wikimedia.org/wikipedia/commons/a/ae/Cups07.jpg" },
    { name:"カップの8", image:"https://upload.wikimedia.org/wikipedia/commons/6/60/Cups08.jpg" },
    { name:"カップの9", image:"https://upload.wikimedia.org/wikipedia/commons/2/24/Cups09.jpg" },

    // 修正済み
    { name:"カップの10", image:"https://upload.wikimedia.org/wikipedia/commons/8/84/Cups10.jpg" },

    { name:"カップのペイジ", image:"https://upload.wikimedia.org/wikipedia/commons/a/ad/Cups11.jpg" },
    { name:"カップのナイト", image:"https://upload.wikimedia.org/wikipedia/commons/f/fa/Cups12.jpg" },
    { name:"カップのクイーン", image:"https://upload.wikimedia.org/wikipedia/commons/6/62/Cups13.jpg" },
    { name:"カップのキング", image:"https://upload.wikimedia.org/wikipedia/commons/0/04/Cups14.jpg" }

];

let currentResult = [];

function secureRandom(max){
    const array = new Uint32Array(1);
    crypto.getRandomValues(array);
    return array[0] % max;
}

function shuffle(array){
    for(let i = array.length - 1; i > 0; i--){
        const j = secureRandom(i + 1);
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function drawTarot(){

    const count = parseInt(document.getElementById("cardCount").value);

    const reverseMode =
        document.getElementById("reverseMode").value === "true";

    let deck = [...tarotCards];

    shuffle(deck);

    const drawn = deck.slice(0, count);

    const resultDiv = document.getElementById("result");

    resultDiv.innerHTML = "";

    currentResult = [];

    drawn.forEach(card => {

        let reversed = false;

        if(reverseMode){
            reversed = secureRandom(2) === 0;
        }

        const position = reversed ? "逆位置" : "正位置";

        const className = reversed ? "reversed" : "upright";

        const rotateStyle =
            reversed ? "transform: rotate(180deg);" : "";

        const cardDiv = document.createElement("div");

        cardDiv.className = "card";

        cardDiv.innerHTML = `
            <img src="${card.image}" style="${rotateStyle}">
            <h3>${card.name}</h3>
            <p class="${className}">${position}</p>
        `;

        resultDiv.appendChild(cardDiv);

        currentResult.push({
            name: card.name,
            image: card.image,
            position: position,
            className: className,
            isReversed: reversed
        });

    });

}

</script>

</body>
</html>
