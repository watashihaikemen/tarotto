<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タロット占い Full Deck</title>
<style>
body{
    margin:0;
    padding:20px;
    background:#111827;
    color:white;
    font-family:sans-serif;
}
.container{
    max-width:1200px;
    margin:auto;
}
h1{
    text-align:center;
    margin-bottom:25px;
}
.controls{
    background:#1f2937;
    padding:20px;
    border-radius:16px;
    margin-bottom:25px;
}
label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
}
select, button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}
button{
    cursor:pointer;
    margin-top:15px;
    transition:0.2s;
}
.drawBtn{
    background:#7c3aed;
    color:white;
}
.drawBtn:hover{
    background:#6d28d9;
}
.saveBtn{
    background:#059669;
    color:white;
}
.saveBtn:hover{
    background:#047857;
}
.deleteBtn{
    background:#dc2626;
    color:white;
}
.deleteBtn:hover{
    background:#b91c1c;
}
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:20px;
}
.card{
    background:#1f2937;
    padding:15px;
    border-radius:16px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}
.card img{
    width:100%;
    border-radius:12px;
    margin-bottom:12px;
}
.card h3{
    margin:0 0 10px;
}
.upright{
    color:#34d399;
    font-weight:bold;
}
.reversed{
    color:#f87171;
    font-weight:bold;
}
.history{
    margin-top:40px;
    background:#1f2937;
    padding:20px;
    border-radius:16px;
}
.historyItem{
    border-bottom:1px solid #374151;
    padding:20px 0;
}
.historyItem:last-child{
    border-bottom:none;
}
.savedCard{
    margin-bottom:8px;
}
.date{
    color:#9ca3af;
    margin-bottom:10px;
    font-size:14px;
}
.deleteSingleBtn{
    background:#ef4444;
    color:white;
    margin-top:15px;
}
.deleteSingleBtn:hover{
    background:#dc2626;
}
.emptyText{
    color:#9ca3af;
}
</style>
</head>

<div class="container">
    <h1>🔮 タロット占い Full Deck 🔮</h1>
    <div class="controls">
        <label>引く枚数 (1〜10)</label>
        <select id="cardCount">
            <option value="1">1枚</option>
            <option value="2">2枚</option>
            <option value="3">3枚</option>
            <option value="4">4枚</option>
            <option value="5">5枚</option>
            <option value="6">6枚</option>
            <option value="7">7枚</option>
            <option value="8">8枚</option>
            <option value="9">9枚</option>
            <option value="10">10枚</option>
        </select>

        <label>正逆設定</label>
        <select id="reverseMode">
            <option value="true">正逆あり</option>
            <option value="false">正逆なし</option>
        </select>

        <button class="drawBtn" onclick="drawTarot()">カードを引く</button>
        <button class="saveBtn" onclick="saveResult()">結果を保存</button>
        <button class="deleteBtn" onclick="deleteAllHistory()">保存結果を全削除</button>
    </div>

    <div class="cards" id="result"></div>

    <div class="history">
        <h2>保存済み結果</h2>
        <div id="historyContent">
            <div class="emptyText">まだ保存された結果はありません。</div>
        </div>
    </div>
</div>

let currentResult = [];

function secureRandom(max){
    const array = new Uint32Array(1);
    crypto.getRandomValues(array);
    return array[0] % max;
}

function shuffle(array){
    for(let i = array.length - 1; i > 0; i--){
        const j = secureRandom(i + 1);
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function drawTarot(){
    const count = parseInt(document.getElementById("cardCount").value);
    const reverseMode = document.getElementById("reverseMode").value === "true";
    let deck = [...tarotCards];
    shuffle(deck);
    const drawn = deck.slice(0, count);
    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "";
    currentResult = [];

    drawn.forEach(card => {
        let reversed = false;
        if(reverseMode){
            reversed = secureRandom(2) === 0;
        }
        const position = reversed ? "逆位置" : "正位置";
        const className = reversed ? "reversed" : "upright";
        const rotateStyle = reversed ? "transform: rotate(180deg);" : "";

        const cardDiv = document.createElement("div");
        cardDiv.className = "card";
        cardDiv.innerHTML = `
            <img src="${card.image}" style="${rotateStyle}">
            <h3>${card.name}</h3>
            <p class="${className}">${position}</p>
        `;
        resultDiv.appendChild(cardDiv);

        currentResult.push({
            name: card.name,
            image: card.image,
            position: position,
            className: className,
            isReversed: reversed
        });
    });
}

function saveResult(){
    if(currentResult.length === 0){
        alert("先にカードを引いてください");
        return;
    }
    const history = JSON.parse(localStorage.getItem("tarotHistory")) || [];
    history.unshift({
        date: new Date().toLocaleString(),
        cards: currentResult
    });
    localStorage.setItem("tarotHistory", JSON.stringify(history));
    loadHistory();
    alert("結果を保存しました");
}

function loadHistory(){
    const historyContent = document.getElementById("historyContent");
    const history = JSON.parse(localStorage.getItem("tarotHistory")) || [];

    if(history.length === 0){
        historyContent.innerHTML = `<div class="emptyText">まだ保存された結果はありません。</div>`;
        return;
    }

    let html = "";
    history.forEach((item, index) => {
        html += `<div class="historyItem"><div class="date">${item.date}</div>`;
        item.cards.forEach(card => {
            const rotateStyle = card.isReversed ? "transform: rotate(180deg);" : "";
            html += `
            <div class="savedCard" style="display:inline-block; margin: 10px; text-align:center; vertical-align:top; width:120px;">
                <img src="${card.image}" width="120" style="border-radius:10px; margin-bottom:8px; ${rotateStyle}">
                <br>
                <span style="font-size:14px;">${card.name}</span>
                <br>
                <span class="${card.className}" style="font-size:12px;">${card.position}</span>
            </div>`;
        });
        html += `<br><button class="deleteSingleBtn" onclick="deleteSingleHistory(${index})">この結果を削除</button></div>`;
    });
    historyContent.innerHTML = html;
}

function deleteSingleHistory(index){
    if(!confirm("この結果を削除しますか？")) return;
    const history = JSON.parse(localStorage.getItem("tarotHistory")) || [];
    history.splice(index, 1);
    localStorage.setItem("tarotHistory", JSON.stringify(history));
    loadHistory();
}

function deleteAllHistory(){
    if(!confirm("保存された結果を全削除しますか？")) return;
    localStorage.removeItem("tarotHistory");
    loadHistory();
    alert("全削除しました");
}

loadHistory();
